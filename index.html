<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h1>Booksky</h1>
    </div>

    <div class="container">
        <div class="bookContainer">
            <h2>Rich Dad and Poor Dad</h2>
            <h5>Robert</h5>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quis modi, cupiditate natus libero doloribus iure magnam quos eum rem, iste dolores debitis vero sapiente. Ut omnis quasi reiciendis eius. Quaerat.</p>
            <button onclick="deletebook(event)">Delete</button>
        </div>
    </div>
    
    <div class="popup-overlay"></div>
        <div class="popup-box">
            <h2>Add Book</h2>
            <form>
            <input type="text" placeholder="Book title" id="book-title-input">
            <input type="text" placeholder="Book Author" id="book-author-input">
            <textarea placeholder="short description" id="short-description-input"></textarea>
            <button id="add-book">ADD</button>
            <button id="cancel-popup">CANCEL</button>
            </form>
        </div>
    



    <button class="add-button" id="add-popup-button">+</button>


    <script src="script.js"></script>
</body>
</html>
